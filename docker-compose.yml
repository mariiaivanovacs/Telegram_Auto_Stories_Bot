services:
  bot:
    build: .
    container_name: auto_competition_bot
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./ready_images:/app/ready_images
      - ./backgrounds:/app/backgrounds
    env_file:
      - .env
    environment:
      - TZ=Europe/Moscow
