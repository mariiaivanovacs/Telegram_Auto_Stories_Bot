channels:
  - username: "@ADSapple"
    display_name: "ADS KZN"
  - username: "@apple_market_kzn"
    display_name: "Apple Market KZN"
  - username: "@skupka_kzn"
    display_name: "Скупка KZN"


pricing:
  discount: 500
  large_change_threshold: 3000

schedule:
  run_time: "09:00"
  timezone: "Europe/Moscow"

story:
  blur_radius: 2
  darken_alpha: 45
  panel_color: [255, 255, 255, 190]
  panel_corner_radius: 24
  padding_x: 60
  padding_y: 48
  font_path: "assets/Inter-SemiBold.ttf"
  font_size_title: 42
  font_size_body: 34
  font_size_price: 38
  line_height: 1.5
  accent_color: "#3C3C3C"
  background_selection: "random"

price_list_template: |
  Любая техника в наличии по выгодной цене 🔥

  iPhone 17
  • 17 Pro 256 ГБ — {iphone_pro_256} руб.
  • 17 Pro 512 ГБ — {iphone_pro_512} руб.
  • 17 Pro 1 ТБ — {iphone_pro_1tb} руб.
  • 17 Pro Max 256 ГБ — {iphone_pro_max_256} руб.
  • 17 Pro Max 512 ГБ — {iphone_pro_max_512} руб.
  • 17 Pro Max 1 ТБ — {iphone_pro_max_1tb} руб.
  • 17 Air — {iphone_air} руб.
  • eSIM доплата +500 руб.

  Девайсы
  • MacBook Neo — {macbook_neo} руб.
  • AirPods Pro 3 — {airpods_pro_3} руб.
  • Whoop 5.0 Peak — {whoop_50} руб.
  • PS5 — {ps5} руб.
  • Apple Watch S11 — {apple_watch_s11} руб.

  Весь товар оригинал, количество ограничено!
  Доставка по Москве за 2 часа
  Заказать: @svyat_001

# Seed admin — replaced with real telegram_id before deployment
admins:
  - telegram_id: 987654321
    username: "@owner"

products:
  - id: iphone_pro_256
    canonical: "iPhone 17 Pro 256 GB"
    category: "iPhone"
    display_name: "17 Pro 256 GB"
    aliases:
      - "iphone 17 pro 256"
      - "17 iphone pro 256"
      - "17 айфон про 256"
      - "17 pro 256 gb"
      - "17 pro 256gb"
      - "iphone 17 pro 256 gb"
      - "айфон 17 про 256"
